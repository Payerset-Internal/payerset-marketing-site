<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001F29"/>
      <stop offset="50%" stop-color="#044261"/>
      <stop offset="100%" stop-color="#032d44"/>
    </linearGradient>
    <pattern id="dots2" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#00B7FD" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="800" height="380" fill="url(#bg2)" rx="16"/>
  <rect width="800" height="380" fill="url(#dots2)" rx="16"/>

  <!-- Divider (centered between content, not canvas) -->
  <line x1="360" y1="15" x2="360" y2="365" stroke="rgba(0,183,253,0.12)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: Single Code label -->
  <text x="190" y="38" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700" letter-spacing="1.5">SINGLE CODE</text>

  <!-- Single card in red — left margin 85px -->
  <g transform="translate(85, 110)">
    <rect width="210" height="56" rx="10" fill="#0a2e3d" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
    <rect x="12" y="16" width="60" height="24" rx="5" fill="rgba(239,68,68,0.15)"/>
    <text x="42" y="33" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">99284</text>
    <text x="82" y="33" fill="white" font-size="12" font-weight="500">$485</text>
  </g>

  <!-- RIGHT: Clinical Bundle label -->
  <text x="570" y="38" text-anchor="middle" fill="#64C2B9" font-size="12" font-weight="700" letter-spacing="1.5">CLINICAL BUNDLE</text>

  <!-- Bundle stack — right margin 85px (425+290=715, 800-715=85) -->
  <g transform="translate(425, 58)">
