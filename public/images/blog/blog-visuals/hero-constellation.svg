<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001F29"/>
      <stop offset="40%" stop-color="#044261"/>
      <stop offset="100%" stop-color="#032d44"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="25%">
      <stop offset="0%" stop-color="rgba(0,146,202,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,146,202,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="72%" cy="55%" r="20%">
      <stop offset="0%" stop-color="rgba(100,194,185,0.12)"/>
      <stop offset="100%" stop-color="rgba(100,194,185,0)"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="30%" r="18%">
      <stop offset="0%" stop-color="rgba(0,183,253,0.1)"/>
      <stop offset="100%" stop-color="rgba(0,183,253,0)"/>
    </radialGradient>
    <pattern id="heroDots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#00B7FD" opacity="0.06"/>
    </pattern>
    <linearGradient id="nodePrimary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B7FD"/>
      <stop offset="100%" stop-color="#0092CA"/>
    </linearGradient>
    <linearGradient id="nodeAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64C2B9"/>
      <stop offset="100%" stop-color="#4BA89F"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#heroBg)" rx="16"/>
  <rect width="1200" height="500" fill="url(#heroDots)" rx="16"/>
  <rect width="1200" height="500" fill="url(#glow1)" rx="16"/>
  <rect width="1200" height="500" fill="url(#glow2)" rx="16"/>
  <rect width="1200" height="500" fill="url(#glow3)" rx="16"/>

  <!-- Connection lines — thin, subtle network edges -->
  <g stroke-width="1" fill="none" opacity="0.15">
    <!-- Primary cluster connections -->
    <line x1="340" y1="200" x2="520" y2="160" stroke="#0092CA"/>
    <line x1="520" y1="160" x2="680" y2="240" stroke="#0092CA"/>
    <line x1="680" y1="240" x2="540" y2="320" stroke="#0092CA"/>
    <line x1="540" y1="320" x2="340" y2="200" stroke="#0092CA"/>
    <line x1="340" y1="200" x2="680" y2="240" stroke="#0092CA" opacity="0.08"/>
    <line x1="520" y1="160" x2="540" y2="320" stroke="#0092CA" opacity="0.08"/>

    <!-- Outer connections -->
    <line x1="150" y1="280" x2="340" y2="200" stroke="#00B7FD"/>
    <line x1="150" y1="280" x2="250" y2="380" stroke="#00B7FD" opacity="0.5"/>
    <line x1="250" y1="380" x2="540" y2="320" stroke="#64C2B9" opacity="0.5"/>
    <line x1="520" y1="160" x2="600" y2="80" stroke="#00B7FD"/>
    <line x1="600" y1="80" x2="780" y2="120" stroke="#00B7FD" opacity="0.5"/>
    <line x1="780" y1="120" x2="680" y2="240" stroke="#0092CA"/>
    <line x1="680" y1="240" x2="860" y2="280" stroke="#64C2B9"/>
    <line x1="860" y1="280" x2="960" y2="200" stroke="#64C2B9" opacity="0.5"/>
    <line x1="860" y1="280" x2="920" y2="380" stroke="#64C2B9" opacity="0.4"/>
    <line x1="540" y1="320" x2="680" y2="400" stroke="#0092CA" opacity="0.5"/>
    <line x1="680" y1="400" x2="860" y2="280" stroke="#0092CA" opacity="0.3"/>

    <!-- Far-reach connections -->
    <line x1="80" y1="150" x2="150" y2="280" stroke="#00B7FD" opacity="0.4"/>
    <line x1="80" y1="150" x2="340" y2="200" stroke="#00B7FD" opacity="0.2"/>
    <line x1="960" y1="200" x2="1080" y2="160" stroke="#64C2B9" opacity="0.4"/>
    <line x1="1080" y1="160" x2="1100" y2="280" stroke="#64C2B9" opacity="0.3"/>
    <line x1="920" y1="380" x2="1100" y2="280" stroke="#64C2B9" opacity="0.2"/>
    <line x1="250" y1="380" x2="400" y2="440" stroke="#0092CA" opacity="0.3"/>
    <line x1="400" y1="440" x2="680" y2="400" stroke="#0092CA" opacity="0.2"/>

    <!-- Crossing long lines for depth -->
    <line x1="150" y1="280" x2="860" y2="280" stroke="#0092CA" opacity="0.04"/>
    <line x1="340" y1="200" x2="960" y2="200" stroke="#00B7FD" opacity="0.03"/>
  </g>

  <!-- Dashed connection lines for variety -->
  <g stroke-width="1" fill="none" opacity="0.12" stroke-dasharray="4,6">
    <line x1="80" y1="150" x2="200" y2="100" stroke="#00B7FD"/>
    <line x1="960" y1="200" x2="1050" y2="340" stroke="#64C2B9"/>
    <line x1="400" y1="440" x2="540" y2="320" stroke="#0092CA"/>
    <line x1="200" y1="100" x2="520" y2="160" stroke="#00B7FD"/>
    <line x1="780" y1="120" x2="960" y2="200" stroke="#00B7FD"/>
  </g>

  <!-- Large background glow nodes -->
  <circle cx="520" cy="240" r="40" fill="#0092CA" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="340" cy="200" r="25" fill="#00B7FD" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="860" cy="280" r="20" fill="#64C2B9" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Primary nodes (larger, glowing) -->
  <circle cx="340" cy="200" r="8" fill="url(#nodePrimary)" opacity="0.9" filter="url(#nodeGlow)"/>
  <circle cx="520" cy="160" r="7" fill="url(#nodePrimary)" opacity="0.85" filter="url(#nodeGlow)"/>
  <circle cx="680" cy="240" r="9" fill="url(#nodePrimary)" opacity="0.9" filter="url(#nodeGlow)"/>
  <circle cx="540" cy="320" r="7" fill="url(#nodeAccent)" opacity="0.85" filter="url(#nodeGlow)"/>

  <!-- Secondary nodes -->
  <circle cx="150" cy="280" r="5" fill="#00B7FD" opacity="0.7"/>
  <circle cx="600" cy="80" r="4.5" fill="#00B7FD" opacity="0.6"/>
  <circle cx="780" cy="120" r="4" fill="#0092CA" opacity="0.6"/>
  <circle cx="860" cy="280" r="6" fill="url(#nodeAccent)" opacity="0.8" filter="url(#nodeGlow)"/>
  <circle cx="960" cy="200" r="4" fill="#64C2B9" opacity="0.6"/>
  <circle cx="250" cy="380" r="4" fill="#0092CA" opacity="0.55"/>
  <circle cx="680" cy="400" r="3.5" fill="#0092CA" opacity="0.5"/>
  <circle cx="920" cy="380" r="3.5" fill="#64C2B9" opacity="0.5"/>

  <!-- Tertiary / satellite dots -->
  <circle cx="80" cy="150" r="3" fill="#00B7FD" opacity="0.4"/>
  <circle cx="200" cy="100" r="2.5" fill="#00B7FD" opacity="0.35"/>
  <circle cx="1080" cy="160" r="3" fill="#64C2B9" opacity="0.4"/>
  <circle cx="1100" cy="280" r="2.5" fill="#64C2B9" opacity="0.35"/>
  <circle cx="400" cy="440" r="2.5" fill="#0092CA" opacity="0.35"/>
  <circle cx="1050" cy="340" r="2" fill="#64C2B9" opacity="0.3"/>

  <!-- Tiny ambient dots scattered for depth -->
  <circle cx="180" cy="170" r="1.5" fill="#00B7FD" opacity="0.2"/>
  <circle cx="430" cy="110" r="1.5" fill="#00B7FD" opacity="0.2"/>
  <circle cx="620" cy="170" r="1.5" fill="#0092CA" opacity="0.2"/>
  <circle cx="750" cy="300" r="1.5" fill="#64C2B9" opacity="0.2"/>
  <circle cx="450" cy="260" r="1.5" fill="#0092CA" opacity="0.15"/>
  <circle cx="300" cy="310" r="1.5" fill="#00B7FD" opacity="0.15"/>
  <circle cx="800" cy="190" r="1.5" fill="#0092CA" opacity="0.15"/>
  <circle cx="1000" cy="270" r="1.5" fill="#64C2B9" opacity="0.15"/>
  <circle cx="120" cy="350" r="1" fill="#00B7FD" opacity="0.12"/>
  <circle cx="1020" cy="140" r="1" fill="#64C2B9" opacity="0.12"/>
  <circle cx="480" cy="390" r="1" fill="#0092CA" opacity="0.12"/>
  <circle cx="720" cy="350" r="1" fill="#64C2B9" opacity="0.12"/>
  <circle cx="280" cy="140" r="1" fill="#00B7FD" opacity="0.1"/>
  <circle cx="900" cy="140" r="1" fill="#64C2B9" opacity="0.1"/>
  <circle cx="560" cy="420" r="1" fill="#0092CA" opacity="0.1"/>
  <circle cx="100" cy="420" r="1" fill="#00B7FD" opacity="0.08"/>
  <circle cx="1140" cy="380" r="1" fill="#64C2B9" opacity="0.08"/>
  <circle cx="50" cy="300" r="1" fill="#00B7FD" opacity="0.08"/>
  <circle cx="1150" cy="120" r="1" fill="#64C2B9" opacity="0.08"/>
</svg>
