<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 445" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001F29"/>
      <stop offset="50%" stop-color="#044261"/>
      <stop offset="100%" stop-color="#032d44"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B7FD"/>
      <stop offset="100%" stop-color="#0092CA"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="52%" r="22%">
      <stop offset="0%" stop-color="rgba(0,183,253,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,183,253,0)"/>
    </radialGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#00B7FD" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="800" height="445" fill="url(#bg)" rx="16"/>
  <rect width="800" height="445" fill="url(#dots)" rx="16"/>
  <rect width="800" height="445" fill="url(#glow)" rx="16"/>

  <!-- Connection lines (no arrowheads) -->
  <!-- Payer MRFs bottom center (225,110) → Hub top-left (355,190) -->
  <path d="M225,110 Q290,155 355,190" fill="none" stroke="#0092CA" stroke-width="1.5" opacity="0.25" stroke-dasharray="6,4"/>
  <!-- Hospital MRFs bottom center (575,110) → Hub top-right (445,190) -->
  <path d="M575,110 Q510,155 445,190" fill="none" stroke="#0092CA" stroke-width="1.5" opacity="0.25" stroke-dasharray="6,4"/>
  <!-- Claims Data top center (400,335) → Hub bottom (400,260) -->
  <path d="M400,335 L400,260" fill="none" stroke="#0092CA" stroke-width="1.5" opacity="0.25" stroke-dasharray="6,4"/>

  <!-- Source 1: Payer MRFs — card center x=225, y=70 -->
  <g transform="translate(100, 30)">
    <rect width="250" height="80" rx="12" fill="#0a2e3d" stroke="rgba(0,183,253,0.2)" stroke-width="1"/>
    <!-- Centered icon+text unit: icon(20px) + gap(10px) + text(~88px) ≈ 118px → offset = (250-118)/2 = 66 -->
    <g transform="translate(66, 27)">
      <rect x="0" y="0" width="20" height="26" rx="3" fill="none" stroke="#00B7FD" stroke-width="1.5" opacity="0.7"/>
      <line x1="5" y1="9" x2="15" y2="9" stroke="#00B7FD" stroke-width="1.2" opacity="0.5"/>
      <line x1="5" y1="14" x2="15" y2="14" stroke="#00B7FD" stroke-width="1.2" opacity="0.5"/>
      <line x1="5" y1="19" x2="12" y2="19" stroke="#00B7FD" stroke-width="1.2" opacity="0.5"/>
    </g>
    <text x="96" y="45" fill="white" font-size="15" font-weight="600">Payer MRFs</text>
  </g>

  <!-- Source 2: Hospital MRFs — card center x=575, y=70 -->
  <g transform="translate(450, 30)">
    <rect width="250" height="80" rx="12" fill="#0a2e3d" stroke="rgba(0,183,253,0.2)" stroke-width="1"/>
    <!-- Centered: icon(20px) + gap(10px) + text(~112px) ≈ 142px → offset = (250-142)/2 = 54 -->
    <g transform="translate(48, 26)">
      <rect x="4" y="8" width="16" height="20" rx="1" fill="none" stroke="#00B7FD" stroke-width="1.5" opacity="0.7"/>
      <line x1="4" y1="28" x2="20" y2="28" stroke="#00B7FD" stroke-width="1.5" opacity="0.7"/>
      <rect x="8" y="13" width="3" height="3" rx="0.5" fill="#00B7FD" opacity="0.4"/>
      <rect x="13" y="13" width="3" height="3" rx="0.5" fill="#00B7FD" opacity="0.4"/>
      <rect x="8" y="19" width="3" height="3" rx="0.5" fill="#00B7FD" opacity="0.4"/>
      <rect x="13" y="19" width="3" height="3" rx="0.5" fill="#00B7FD" opacity="0.4"/>
      <line x1="12" y1="0" x2="12" y2="8" stroke="#00B7FD" stroke-width="1.5" opacity="0.7"/>
      <line x1="8" y1="4" x2="16" y2="4" stroke="#00B7FD" stroke-width="1.2" opacity="0.5"/>
    </g>
    <text x="78" y="45" fill="white" font-size="15" font-weight="600">Hospital MRFs</text>
  </g>

  <!-- Center hub -->
  <g transform="translate(310, 190)">
    <rect x="-6" y="-6" width="192" height="82" rx="16" fill="none" stroke="url(#badge)" stroke-width="2" opacity="0.35"/>
    <rect width="180" height="70" rx="14" fill="#0a2e3d" stroke="url(#badge)" stroke-width="1.5"/>
    <rect x="1" y="1" width="178" height="68" rx="13" fill="rgba(0,183,253,0.05)"/>
    <text x="90" y="30" text-anchor="middle" fill="white" font-size="14" font-weight="700" font-family="Inter, sans-serif">Validated</text>
    <text x="90" y="50" text-anchor="middle" fill="white" font-size="14" font-weight="700" font-family="Inter, sans-serif">Reimbursement</text>
  </g>

  <!-- Source 3: Claims Data — card center x=400, y=375 -->
  <g transform="translate(275, 335)">
    <rect width="250" height="80" rx="12" fill="#0a2e3d" stroke="rgba(0,183,253,0.2)" stroke-width="1"/>
    <!-- Centered: icon(20px) + gap(10px) + text(~98px) ≈ 128px → offset = (250-128)/2 = 61 -->
    <g transform="translate(61, 23)">
      <rect x="0" y="16" width="5" height="10" rx="1" fill="none" stroke="#00B7FD" stroke-width="1.3" opacity="0.7"/>
      <rect x="7" y="8" width="5" height="18" rx="1" fill="none" stroke="#00B7FD" stroke-width="1.3" opacity="0.7"/>
      <rect x="14" y="12" width="5" height="14" rx="1" fill="none" stroke="#00B7FD" stroke-width="1.3" opacity="0.7"/>
      <line x1="0" y1="26" x2="19" y2="26" stroke="#00B7FD" stroke-width="1.2" opacity="0.5"/>
    </g>
    <text x="91" y="45" fill="white" font-size="15" font-weight="600">Claims Data</text>
  </g>
</svg>
