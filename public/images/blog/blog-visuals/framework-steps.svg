<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001F29"/>
      <stop offset="50%" stop-color="#044261"/>
      <stop offset="100%" stop-color="#032d44"/>
    </linearGradient>
    <linearGradient id="badge4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B7FD"/>
      <stop offset="100%" stop-color="#0092CA"/>
    </linearGradient>
    <pattern id="dots4" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#00B7FD" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="800" height="320" fill="url(#bg4)" rx="16"/>
  <rect width="800" height="320" fill="url(#dots4)" rx="16"/>

  <!-- LEFT COLUMN: Steps 01-04 -->
  <line x1="76" y1="30" x2="76" y2="290" stroke="rgba(0,183,253,0.12)" stroke-width="2"/>

  <g transform="translate(40, 28)">
    <rect x="20" y="0" width="32" height="32" rx="9" fill="url(#badge4)"/>
    <text x="36" y="22" text-anchor="middle" fill="#001F29" font-size="11" font-weight="700" font-family="monospace">01</text>
    <text x="64" y="22" fill="white" font-size="13" font-weight="600">Start with strategy</text>
  </g>

  <g transform="translate(40, 98)">
    <rect x="20" y="0" width="32" height="32" rx="9" fill="url(#badge4)"/>
    <text x="36" y="22" text-anchor="middle" fill="#001F29" font-size="11" font-weight="700" font-family="monospace">02</text>
    <text x="64" y="22" fill="white" font-size="13" font-weight="600">Use multiple data sources</text>
  </g>

  <g transform="translate(40, 168)">
    <rect x="20" y="0" width="32" height="32" rx="9" fill="url(#badge4)"/>
    <text x="36" y="22" text-anchor="middle" fill="#001F29" font-size="11" font-weight="700" font-family="monospace">03</text>
    <text x="64" y="22" fill="white" font-size="13" font-weight="600">Build clinically appropriate bundles</text>
  </g>

  <g transform="translate(40, 238)">
    <rect x="20" y="0" width="32" height="32" rx="9" fill="url(#badge4)"/>
    <text x="36" y="22" text-anchor="middle" fill="#001F29" font-size="11" font-weight="700" font-family="monospace">04</text>
    <text x="64" y="22" fill="white" font-size="13" font-weight="600">Capture all components</text>
  </g>

  <!-- RIGHT COLUMN: Steps 05-07 -->
  <line x1="476" y1="30" x2="476" y2="220" stroke="rgba(0,183,253,0.12)" stroke-width="2"/>

  <g transform="translate(440, 28)">
    <rect x="20" y="0" width="32" height="32" rx="9" fill="url(#badge4)"/>
    <text x="36" y="22" text-anchor="middle" fill="#001F29" font-size="11" font-weight="700" font-family="monospace">05</text>
    <text x="64" y="22" fill="white" font-size="13" font-weight="600">Understand contract structures</text>
  </g>

  <g transform="translate(440, 98)">
    <rect x="20" y="0" width="32" height="32" rx="9" fill="url(#badge4)"/>
    <text x="36" y="22" text-anchor="middle" fill="#001F29" font-size="11" font-weight="700" font-family="monospace">06</text>
    <text x="64" y="22" fill="white" font-size="13" font-weight="600">Validate with claims data</text>
  </g>

  <g transform="translate(440, 168)">
    <rect x="20" y="0" width="32" height="32" rx="9" fill="url(#badge4)"/>
    <text x="36" y="22" text-anchor="middle" fill="#001F29" font-size="11" font-weight="700" font-family="monospace">07</text>
    <text x="64" y="22" fill="white" font-size="13" font-weight="600">Acknowledge limitations</text>
  </g>
</svg>
