    <text x="34" y="23" text-anchor="middle" fill="#64C2B9" font-size="10" font-weight="600">99284</text>
    <text x="70" y="23" fill="#cbd5e1" font-size="11">ED Visit Level 4</text>
    <text x="260" y="23" text-anchor="end" fill="white" font-size="12" font-weight="600">$312</text>
  </g>

  <g transform="translate(425, 102)">
    <rect width="290" height="38" rx="7" fill="#0a2e3d" stroke="rgba(100,194,185,0.2)" stroke-width="1"/>
    <rect x="8" y="8" width="52" height="22" rx="4" fill="rgba(100,194,185,0.12)"/>
    <text x="34" y="23" text-anchor="middle" fill="#64C2B9" font-size="10" font-weight="600">80053</text>
